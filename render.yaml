services:
  - type: web
    name: herbal-crm-api
    runtime: node
    rootDir: server
    buildCommand: npm install
    startCommand: npm start
    plan: free
    envVars:
      - key: NODE_VERSION
        value: 18
      - key: MONGODB_URI
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: EMAIL_USER
        sync: false
      - key: EMAIL_APP_PASSWORD
        sync: false
      - key: EMAIL_FROM_NAME
        value: Herbal CRM
      - key: EMAIL_PROVIDER
        value: smtp
      - key: EMAIL_FROM
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: 465
      - key: SMTP_SECURE
        value: true
      - key: SMTP_CONNECTION_TIMEOUT_MS
        value: 30000
      - key: SMTP_GREETING_TIMEOUT_MS
        value: 20000
      - key: SMTP_SOCKET_TIMEOUT_MS
        value: 45000
      - key: CAMPAIGN_DELIVERY_MODE
        value: simulated
      - key: CAMPAIGN_TEST_RECIPIENT
        sync: false
      - key: BACKEND_URL
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false
